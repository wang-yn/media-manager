[server]
host = "0.0.0.0"
port = 8000

[paths]
config_dir = "/config"
media_dir = "/media"

[tmdb]
api_key_env = "TMDB_API_KEY"

[[libraries]]
name = "Movies"
kind = "movie"
path = "/media/movies"

[[libraries]]
name = "TV Shows"
kind = "series"
path = "/media/tv"

[organizer.movie]
directory_template = "{title} ({year})"
file_template = "{title} ({year})"

[organizer.series]
show_template = "{title}"
season_template = "Season {season:02d}"
episode_template = "{title} - S{season:02d}E{episode:02d} - {episode_title}"
