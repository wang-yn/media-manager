[server]
host = "0.0.0.0"
port = 8000

[paths]
config_dir = "/config"
media_dir = "/media"

[tmdb]
api_key_env = "TMDB_API_KEY"

[assrt]
token_env = "ASSRT_API_TOKEN"

[[libraries]]
name = "Movies"
kind = "movie"
path = "/media/movies"

[[libraries]]
name = "TV Shows"
kind = "series"
path = "/media/tv"

[organizer.movie]
directory_template = "{original_title} - {title} ({year})"
file_template = "{original_title} - {title} ({year})"

[organizer.series]
show_template = "{original_title} - {title} ({year})"
season_template = "Season {season:02d}"
episode_template = "{original_title} - {title} - S{season:02d}E{episode:02d}"
